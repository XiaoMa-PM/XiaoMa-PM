name: Generate Contribution Snake

on:
  schedule:
    # Run every 6 hours for live updates
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: XiaoMa-PM
          output_file_path: contribution-snake.svg
          pen_color: "#58a6ff"
          fill_color: "#0d1117"

      - name: Push snake SVG to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contribution-snake.svg
          git commit -m "feat: update contribution snake [skip ci]"
          git push origin HEAD:master --force
