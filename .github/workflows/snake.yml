name: Generate Contribution Snake

on:
  schedule:
    # Run every 6 hours for live updates
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: Platane/snk@v3
        with:
          github_user_name: XiaoMa-PM
          outputs: |
            contribution-snake.svg?palette=github-dark&color_snake=58a6ff

      - name: Push snake SVG to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contribution-snake.svg
          git commit -m "feat: update contribution snake [skip ci]"
          git push origin HEAD:master --force
